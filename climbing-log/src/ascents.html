<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Ascents — Climbing Log</title>
  <link rel="stylesheet" href="colors.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600&family=Open+Sans:wght@400;500;600&display=swap');

    :root {
      --bg:         #0f1117;
      --surface:    #181c26;
      --border:     #252b3b;
      --border-focus: #2f6fe8;
      --blue:       #2f6fe8;
      --blue-dim:   #1a3e8a;
      --blue-hover: #4480f5;
      --text:       #b8ccf0;
      --text-muted: #6b7799;
      --input-bg:   #13172080;
      --radius:     4px;
      --gap:        1.5rem;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Roboto', 'Open Sans', system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.5;
    }

    /* ── Layout ──────────────────────────────── */
    .shell {
      min-height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 0 clamp(1rem, 4vw, 2.5rem);
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .logo {
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--blue);
    }

    nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 0.03em;
      transition: color 0.15s;
    }
    nav a:hover { color: var(--text); }

    main {
      padding: clamp(2rem, 6vw, 4rem) clamp(1rem, 4vw, 2.5rem);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      width: 100%;
    }

    .container {
      width: 100%;
      max-width: 800px;
    }

    /* ── Typography ──────────────────────────── */
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin-bottom: 0.5rem;
      color: #e8ecf4;
    }

    .subtitle {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-bottom: var(--gap);
    }

    /* ── Filters ─────────────────────────────── */
    .filters {
      display: grid;
      gap: var(--gap);
      margin-bottom: var(--gap);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: clamp(1.5rem, 4vw, 2rem);
      border-radius: var(--radius);
    }

    .filter-row {
      display: grid;
      gap: var(--gap);
      grid-template-columns: 1fr 1fr;
    }

    @media (max-width: 600px) {
      .filter-row {
        grid-template-columns: 1fr;
      }
    }

    .field { display: flex; flex-direction: column; gap: 0.4rem; }

    label {
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    input, select {
      background: var(--input-bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      padding: 0.6rem 0.75rem;
      width: 100%;
      outline: none;
      border-radius: var(--radius);
      transition: border-color 0.15s, background 0.15s;
      -webkit-appearance: none;
      appearance: none;
    }

    input::placeholder { color: var(--text-muted); }

    input:focus, select:focus {
      border-color: var(--border-focus);
      background: var(--surface);
    }

    /* Custom select arrow */
    .select-wrap { position: relative; }
    .select-wrap::after {
      content: '';
      pointer-events: none;
      position: absolute;
      right: 0.8rem;
      top: 50%;
      transform: translateY(-50%);
      border: 5px solid transparent;
      border-top-color: var(--text-muted);
      border-bottom: none;
    }
    .select-wrap select { padding-right: 2.2rem; cursor: pointer; }
    select option { background: #1a1f2e; }

    /* ── List ────────────────────────────────── */
    .ascents-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .ascent-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 1rem;
      align-items: start;
      transition: border-color 0.15s;
    }

    .ascent-item:hover {
      border-color: var(--border-focus);
    }

    .ascent-info {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .ascent-name {
      font-size: 1.1rem;
      font-weight: 600;
      color: #e8ecf4;
    }

    .ascent-meta {
      font-size: 0.85rem;
      color: var(--text-muted);
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .ascent-meta-item {
      display: flex;
      gap: 0.35rem;
    }

    .ascent-meta-label {
      font-weight: 500;
      color: var(--text-muted);
    }

    .ascent-meta-value {
      color: var(--text);
    }

    .ascent-style {
      display: inline-block;
      background: var(--blue-dim);
      color: var(--blue-hover);
      padding: 0.2rem 0.6rem;
      border-radius: 3px;
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .ascent-notes {
      margin-top: 0.5rem;
      font-size: 0.9rem;
      color: var(--text);
      line-height: 1.4;
    }

    .ascent-actions {
      display: flex;
      gap: 0.5rem;
    }

    .btn {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }

    .btn-edit {
      background: var(--blue-dim);
      color: var(--blue-hover);
      border: 1px solid var(--blue);
    }

    .btn-edit:hover {
      background: var(--blue);
      color: #fff;
    }

    .btn-delete {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .btn-delete:hover {
      color: #ff6b6b;
      border-color: #ff6b6b;
    }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
    }

    .empty-state p {
      margin-bottom: 1.5rem;
    }

    .btn-primary {
      background: var(--blue);
      color: #fff;
      padding: 0.6rem 1.4rem;
      font-size: 0.88rem;
    }

    .btn-primary:hover {
      background: var(--blue-hover);
    }

    /* ── Footer ──────────────────────────────── */
    footer {
      border-top: 1px solid var(--border);
      padding: 0.9rem clamp(1rem, 4vw, 2.5rem);
      font-size: 0.75rem;
      color: var(--text-muted);
      text-align: center;
    }

    @media (max-width: 420px) {
      .ascent-item {
        grid-template-columns: 1fr;
      }

      .ascent-actions {
        flex-direction: column;
      }

      .btn {
        width: 100%;
        text-align: center;
      }
    }
  </style>
</head>
<body>
<div class="shell">

  <header>
    <span class="logo">Climbing Log</span>
    <nav><a href="log-climb.html">Log a Climb</a></nav>
  </header>

  <main>
    <div class="container">
      <h1>All Ascents</h1>
      <p class="subtitle">View and manage your climbing log.</p>

      <!-- Filters -->
      <div class="filters">
        <div class="filter-row">
          <div class="field">
            <label for="search-name">Search Route Name</label>
            <input id="search-name" type="text" placeholder="e.g. Salathe Wall">
          </div>
          <div class="field">
            <label for="search-area">Search Area</label>
            <input id="search-area" type="text" placeholder="e.g. Yosemite Valley">
          </div>
        </div>
        <div class="field">
          <label for="filter-style">Filter by Climbing Style</label>
          <div class="select-wrap">
            <select id="filter-style">
              <option value="">All Styles</option>
              <option value="sport">Sport</option>
              <option value="trad">Trad</option>
              <option value="top-rope">Top Rope</option>
              <option value="indoor">Indoor</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Ascents List -->
      <div id="ascents-container">
        <div class="empty-state">
          <p>No ascents yet. <a href="log-climb.html" style="color: var(--blue); text-decoration: none;">Log your first climb!</a></p>
        </div>
      </div>
    </div>
  </main>

  <footer>Climbing Log</footer>

</div>

<script src="app.js"></script>
<script>
  const searchName = document.getElementById('search-name');
  const searchArea = document.getElementById('search-area');
  const filterStyle = document.getElementById('filter-style');
  const container = document.getElementById('ascents-container');

  function renderAscents() {
    const allAscents = getAscents();
    const sorted = sortByDate(allAscents);
    const filtered = filterAscents(
      sorted,
      searchName.value,
      searchArea.value,
      filterStyle.value
    );

    if (filtered.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <p>No ascents match your filters.</p>
          <p><a href="log-climb.html" style="color: var(--blue); text-decoration: none;">Log a new climb</a></p>
        </div>
      `;
      return;
    }

    container.innerHTML = `<div class="ascents-list">${filtered.map(ascent => `
      <div class="ascent-item">
        <div class="ascent-info">
          <div class="ascent-name">${escapeHtml(ascent.name)}</div>
          <div class="ascent-meta">
            <div class="ascent-meta-item">
              <span class="ascent-meta-label">Area:</span>
              <span class="ascent-meta-value">${escapeHtml(ascent.area)}</span>
            </div>
            <div class="ascent-meta-item">
              <span class="ascent-meta-label">Date:</span>
              <span class="ascent-meta-value">${formatDate(ascent.date)}</span>
            </div>
            ${ascent.grade ? `
              <div class="ascent-meta-item">
                <span class="ascent-meta-label">Grade:</span>
                <span class="ascent-meta-value">${escapeHtml(ascent.grade)}</span>
              </div>
            ` : ''}
            <div class="ascent-style">${escapeHtml(ascent.style)}</div>
          </div>
          ${ascent.notes ? `<div class="ascent-notes">${escapeHtml(ascent.notes)}</div>` : ''}
        </div>
        <div class="ascent-actions">
          <button class="btn btn-edit" onclick="editAscent('${ascent.id}')">Edit</button>
          <button class="btn btn-delete" onclick="handleDeleteAscent('${ascent.id}')">Delete</button>
        </div>
      </div>
    `).join('')}</div>`;
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function formatDate(dateStr) {
    const date = new Date(dateStr + 'T00:00:00');
    return date.toLocaleDateString('en-US', {
      year: 'numeric',
      month: 'short',
      day: 'numeric'
    });
  }

  function editAscent(id) {
    window.location.href = `log-climb.html?edit=${encodeURIComponent(id)}`;
  }

  function handleDeleteAscent(id) {
    const ascent = getAscent(id);
    if (confirm(`Delete "${escapeHtml(ascent.name)}"?`)) {
      deleteAscent(id);
      renderAscents();
    }
  }

  // Debounced render on search/filter input
  let renderTimeout;
  function debounceRender() {
    clearTimeout(renderTimeout);
    renderTimeout = setTimeout(renderAscents, 150);
  }

  searchName.addEventListener('input', debounceRender);
  searchArea.addEventListener('input', debounceRender);
  filterStyle.addEventListener('change', debounceRender);

  // Initial render
  renderAscents();
</script>
</body>
</html>
